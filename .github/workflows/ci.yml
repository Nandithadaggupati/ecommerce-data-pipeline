name: Data Pipeline CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Create schemas
        env:
          PGPASSWORD: password
        run: |
          sleep 5
          psql -h localhost -U admin -d ecommerce_db -f sql/ddl/create_staging_schema.sql
          psql -h localhost -U admin -d ecommerce_db -f sql/ddl/create_production_schema.sql
          psql -h localhost -U admin -d ecommerce_db -f sql/ddl/create_warehouse_schema.sql
          
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerce_db
          DB_USER: admin
          DB_PASSWORD: password
        run: |
          python -m pytest tests/ -v
